<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EvoPlay - Your Ultimate Gaming Store</title>
  <link rel="stylesheet" href="styles.css" />
  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>

<body>
  <!-- Header / Navbar -->
  <header>
    <nav>
      <div class="logo">
        <h1>EvoPlay</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
        <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>

  <!-- Hero Section -->
  <section class="hero">
    <h2>Level Up Your Gaming Experience</h2>
    <p>Explore Latest games, consoles, and accessories at EvoPlay.</p>
    <a href="games.html" class="btn-primary">Shop Now</a>
  </section>


  <div class="video-background">
    <video autoplay muted loop playsinline>
      <source src=public/game" type="video/mp4" />
    </video>
  </div>
  
  <!-- Featured Products Section -->
  <section class="featured-products">
    <h3>Featured Games</h3>
    <div class="products-grid">
      <div class="product-card">
        <img src="public/pubg.jpeg" alt="Game 1" />

        <a href="games.html" class="btn-primary">Shop Now</a>
      </div>
      <div class="product-card">
        <img src="public/free.jpeg" alt="Game 2" />
        <h4>Free fire</h4>
        <a href="games.html" class="btn-primary">Shop Now</a>
      </div>
      <div class="product-card">
        <img src="public/train.jpeg" alt="Game 3" />
        <h4>Indian Train simulator</h4>
        <a href="games.html" class="btn-primary">Shop Now</a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 EvoPlay. All rights reserved.</p>
    <p>
      Follow us on
      <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
